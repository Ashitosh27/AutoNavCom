<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Component Registration</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .form-label {
            font-weight: bold;
        }
        .btn-custom {
            background-color: #2575fc;
            border: none;
        }
        .btn-custom:hover {
            background-color: #1a5edb;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4">
				
				<div th:if="${responseSuccess} != null"
							class="alert alert-success scs mt-3" th:text="${responseSuccess}"></div>
							
						
				<div th:if="${responseFailed} != null"
							class="alert alert-danger dngr mt-3" th:text="${responseFailed}"></div>
				
				
                <h3 class="text-center mb-4 text-primary">Component Registration</h3>
                
                <!-- Thymeleaf form -->
                <form th:action="@{/component/Component_registration}" th:object="${component}" method="post">
                    
                    <!-- User ID -->
                    <div class="mb-3">
                        <label for="componentId" class="form-label">Component ID</label>
                        <input type="number" th:field="*{componentId}" class="form-control" id="componentId" placeholder="Enter Component ID" required>
                    </div>

                    <!-- User Name -->
                    <div class="mb-3">
                        <label for="componentName" class="form-label">Component Name</label>
                        <input type="text" th:field="*{componentName}" class="form-control" id="componentName" placeholder="Enter Component name" maxlength="100" required>
                    </div>

<!--                     Mobile Number 
                    <div class="mb-3">
                        <label for="mobileNo" class="form-label">Mobile No</label>
                        <input type="tel" th:field="*{mobileNo}" class="form-control" id="mobileNo" placeholder="Enter mobile number" maxlength="15" required>
                    </div>

                     Email 
                    <div class="mb-3">
                        <label for="emailId" class="form-label">Email ID</label>
                        <input type="email" th:field="*{emailId}" class="form-control" id="emailId" placeholder="Enter email address" maxlength="50" required>
                    </div>-->

                    <!-- Submit Button -->
					
					
                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom text-white">Register</button>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
